name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Fail-fast: cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Browser bundle needs these at build time. They're not secrets
          # (anon key is public-by-design). CI uses the live project's
          # public values so the bundle resolves.
          VITE_SUPABASE_URL: https://ncfhmbugjeuerchleegq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

  # TEMPORARY: dev-seeds CI surfaced multiple pre-existing latent bugs
  # across migrations (handle_new_user cascade collisions, ON COMMIT
  # DROP outside transactions, SET LOCAL ROLE anon Postgres-image
  # crashes, missing Vault secrets in ephemeral DBs). Marked non-
  # blocking until a tech-debt sweep clears them post-V1.
  # Re-enable as a blocking gate before any post-V1 PR is merged.
  # See audits/2026-05-24/dev-seed-tech-debt.md for the issue list.
  dev-seeds:
    name: Dev-seeds (supabase local)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned, NOT `latest`: with `latest`, setup-cli resolves the newest
          # release over the network on every run. That lookup returned 504
          # Gateway Time-out and killed this job at setup in ~4s — the CLI was
          # never installed, so the if:always() "Stop Supabase" step then hit
          # `supabase: command not found` (exit 127). A pinned tag downloads
          # the release directly (no latest-resolution call) and reproduces the
          # exact local toolchain the dev-seeds were validated against
          # (`supabase --version` -> 2.104.0). Bump deliberately, not to latest.
          version: 2.104.0

      - name: Start local Supabase stack
        run: supabase start --exclude=studio,inbucket,realtime,storage-api,imgproxy,edge-runtime,vector

      - name: Resolve local Postgres connection
        id: db
        run: |
          # supabase status prints a table with the local DB URL. Extract it.
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          echo "url=${DB_URL}" >> "$GITHUB_OUTPUT"
          echo "DB_URL=${DB_URL}" >> "$GITHUB_ENV"

      - name: Apply admin-user fixture
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/ci/admin-fixture.sql

      - name: Run all dev-seeds
        run: bash scripts/ci/run-dev-seeds.sh

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e:
    name: E2E (playwright)
    runs-on: ubuntu-latest
    # Skip until the E2E Supabase test project is provisioned. Once
    # Divit creates it, add E2E_SUPABASE_PROJECT_REF (and the matching
    # URL/keys) to repo secrets and remove the `if: false` line.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run e2e:install
      - run: npm run e2e
        env:
          E2E_SUPABASE_PROJECT_REF: ${{ secrets.E2E_SUPABASE_PROJECT_REF }}
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
